<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Weather App</title>
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter Location" spellcheck="false">
            <button><img src="search-svgrepo-com.svg" alt="search"></button>

        </div>
        <div class="weather"><img src="" alt="" class="icon"></div>
        <h1 class="temp"></h1>
        <h2 class="city"></h2>
        <div class="details">
            <div class="col">
                <img src="wind2.png" alt="">
                <div>
                    <p class="wind"></p>
                    <p>Wind Speed</p>
                </div>
            <div class="col">
                <img src="humidity.png" alt="">
                <div>
                    <p class="humidity"></p>
                    <p>Humidity</p>
                </div>
            </div>
        </div>
    </div>
        

</body>
<script>
    const ApiKey = "f95cacd94eabdd6faa9fac490b04123c"
    const ApiURL = "https://api.openweathermap.org/data/2.5/weather?&units=metric&q="
    const searchBar = document.querySelector('.search input')
    const searchButton = document.querySelector('.search button')
    const icon = document.querySelector('.icon')
    async function Wheathercheck(city) {
        const responce = await fetch(ApiURL + city + `&appid=${ApiKey}`);
        var data  = await responce.json()

        console.log(data);
        
        document.querySelector(".city").innerHTML = data.name;
        document.querySelector(".temp").innerHTML = data.main.temp + "°C";
        document.querySelector(".humidity").innerHTML = data.main.humidity + "%";
        document.querySelector(".wind").innerHTML = data.wind.speed + " km/h";


        if (data.weather[0].main == "Clouds") {
            icon.src = "weather.png"
        }

        else if (data.weather[0].main === "Rain") {
            icon.src = "clouds.png"
        }

        else if (data.weather[0].main === "Clear") {
            icon.src = "Clear.png"
        }

        else if (data.weather[0].main === "Drizzle") {
            icon.src = "Drizzle.webp"
        }

        else if (data.weather[0].main === "Mist") {
            icon.src = "Mist.webp"
        }
        document.querySelector('.weather').style.display = 'block'
       
    }
    searchButton.addEventListener('click',function(e){
        Wheathercheck(searchBar.value) 
    })
    

</script>
</html>
